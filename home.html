<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ceritaku</title>

<link rel="stylesheet" href="home.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

</head>

<body>

<header class="header">

<div class="logo-area">

<img src="aset/logo.png" class="logo">

<h2>Ceritaku</h2>

</div>

<div class="header-menu">

<button id="searchBtn">

<i class="fa-solid fa-magnifying-glass"></i>

</button>

<a href="profile.html" class="profile" id="profileBtn">

<i class="fa-solid fa-user-circle"></i>

</a>

</div>

</header>

<section class="banner">

<h1>Selamat Datang</h1>

<p>Temukan ribuan cerita menarik dari berbagai penulis.</p>

</section>

<div class="search-box">

<input
type="text"
id="searchNovel"
placeholder="Cari judul novel...">

</div>

<section class="title">

<h2>Novel Terbaru</h2>

</section>

<section id="novelList">

<div class="empty">

<i class="fa-solid fa-book-open"></i>

<h3>Belum Ada Novel</h3>

<p>Novel yang diterbitkan akan muncul di sini.</p>

</div>

</section>

<a href="writer.html" class="write-btn" id="writeBtn">

<i class="fa-solid fa-pen"></i>

</a>

<script src="home.js"></script>

</body>
</html>
