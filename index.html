<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ceritaku</title>

    <link rel="stylesheet" href="style.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</head>

<body>

<!-- Splash -->
<div id="splash">

    <div class="splash-content">

        <img src="aset/logo.png" class="logo" alt="Logo">

        <h1>Ceritaku</h1>

        <p>Tempat semua cerita dimulai.</p>

    </div>

</div>

<!-- Welcome -->
<section class="welcome">

    <div class="welcome-box">

        <img src="aset/logo.png" class="logo-main" alt="Logo">

        <h1>Ceritaku</h1>

        <p>
            Tulis novelmu, simpan idemu,
            dan bagikan ceritamu kepada dunia.
        </p>

        <div class="button-group">

<a href="login.html" class="btn-login">
    <i class="fa-solid fa-right-to-bracket"></i>
    Masuk
</a>

<a href="register.html" class="btn-register">
    <i class="fa-solid fa-user-plus"></i>
    Daftar
</a>

<a href="home.html" class="btn-guest">
    <i class="fa-solid fa-user"></i>
    Masuk Sebagai Tamu
</a>

        </div>

    </div>

</section>

<!-- Dashboard -->
<section class="dashboard hidden">

<header>

    <h2>
        <i class="fa-solid fa-book-open"></i>
        Ceritaku
    </h2>

    <button id="logoutBtn">
        <i class="fa-solid fa-arrow-left"></i>
    </button>

</header>

<div class="search-box">

    <i class="fa-solid fa-magnifying-glass"></i>

    <input
    type="text"
    id="search"
    placeholder="Cari novel...">

</div>

<button id="newNovel">

    <i class="fa-solid fa-pen"></i>

    Tulis Novel Baru

</button>

<div id="emptyState">

    <i class="fa-solid fa-book"></i>

    <h3>Belum Ada Novel</h3>

    <p>
        Belum ada novel.
        Mulailah menulis cerita pertamamu.
    </p>

</div>

<div id="novelContainer">

</div>

</section>

<!-- Popup -->
<div id="popup" class="popup">

<div class="popup-content">

<button id="closePopup" type="button">

<i class="fa-solid fa-arrow-left"></i>

</button>

<h2>Tulis Novel</h2>

<form id="novelForm">

<input
type="text"
id="judul"
placeholder="Judul Novel"
required>

<input
type="text"
id="genre"
placeholder="Genre">

<textarea
id="sinopsis"
placeholder="Sinopsis"
rows="4"></textarea>

<textarea
id="isiNovel"
placeholder="Mulai menulis..."
rows="10"></textarea>

<button type="submit">

Simpan Novel

</button>

</form>

</div>

</div>

<!-- Toast -->
<div id="toast">

Berhasil disimpan

</div>

<script src="script.js"></script>

</body>
</html>
